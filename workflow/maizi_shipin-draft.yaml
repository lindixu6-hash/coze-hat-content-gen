      parameters:
        code: "async function main({ params }: Args): Promise<Output> {\n  const title = params.title || \"\";\n  const content = params.content || \"\";\n  const urlList = params.url || []; \n\n  const fields = {\n    \"title\": title,\n    \"content\": content\n  };\n\n  for (let i = 0; i < 5; i++) {\n    const fieldName = `video${i + 1}`;\n    const currentUrl = urlList[i];\n\n    if (currentUrl) {\n      // 必须包装成飞书认的对象格式\n      fields[fieldName] = {\n        \"text\": \"点击播放视频\" + (i + 1),\n        \"link\": currentUrl\n      };\n    } else {\n      fields[fieldName] = null; // 没链接就给 null\n    }\n  }\n\n  return {\n    \"final_list\": [{ \"fields\": fields }]\n  };\n}"
        language: 5
        node_inputs:
            - name: title
              input:
                value:
                    path: title
                    ref_node: "157314"
            - name: content
              input:
                value:
                    path: content
                    ref_node: "157314"
            - name: url
