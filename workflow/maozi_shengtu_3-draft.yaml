    - id: "113596"
      type: code
      title: 代码 转array{string}
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1048.0611079826344
        y: 479.18215228036286
      parameters:
        code: |-
            async function main({ params }: Args): Promise<Output> {
                // 1. 从 params 中获取你在右侧面板定义的两个变量
                // 请确保右侧“输入”列表里的变量名分别是 front_image 和 lateral_image
                const img1 = params.front_image;
                const img2 = params.lateral_image;

                // 2. 提取 URL 并过滤掉空值
                // 兼容处理：无论传入的是对象 {url: "..."} 还是直接的字符串 URL
                const getUrl = (img) => {
                    if (!img) return null;
                    if (typeof img === 'object' && img.url) return img.url;
                    if (typeof img === 'string') return img;
                    return null;
                };

                const urlArray = [getUrl(img1), getUrl(img2)].filter(url => url !== null);

                // 3. 返回包含数组的对象
                // 这里的 key 名（url）要和你在右侧“输出”面板定义的变量名一致
                return {
                    "url": urlArray
                };
            }
        language: 5
        node_inputs:
            - name: front_image
              input:
                type: image
                value:
                    path: data
                    ref_node: "114960"
            - name: lateral_image
              input:
                type: image
                value:
                    path: data
                    ref_node: "1759750"
        node_outputs:
            url:
                type: list
                items:
                    type: string
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
