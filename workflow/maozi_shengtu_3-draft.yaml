      parameters:
        code: "async function main({ params }: Args): Promise<Output> {\n    const input = params.lateral_image; // 确保这里对应你的输入变量名\n    let finalUrl = \"\";\n\n    if (input) {\n        // 1. 尝试直接获取 url 属性 (最常见情况)\n        if (typeof input === 'object') {\n            finalUrl = input.url || input.file_url || \"\";\n        } \n        \n        // 2. 如果还是没找到，或者是字符串，尝试正则提取\n        if (!finalUrl) {\n            const rawString = typeof input === 'string' ? input : JSON.stringify(input);\n            const match = rawString.match(/https?:\\/\\/[^\\s<>\"]+/);\n            if (match) {\n                // 清理可能存在的转义字符或引号\n                finalUrl = match[0].replace(/\\\\\"/g, '').replace(/\"/g, '');\n            }\n        }\n    }\n\n    return {\n        \"l_url\": finalUrl || \"No URL found\" // 对应你的输出变量名\n    };\n}"
